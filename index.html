<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bright Winter</title>

<style>
*{box-sizing:border-box;}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
margin:0;
background:#f5f2f1;
}

.container{
max-width:900px;
margin:auto;
padding:8px 16px 16px;
}

.header{
text-align:center;
margin-bottom:8px;
}

.logo{
display:block;
max-width:220px;
margin:0 auto 6px;
}

.header h1{
font-family:Georgia,serif;
font-weight:500;
margin:0;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.section-title{
grid-column:1/-1;
font-size:12px;
letter-spacing:.15em;
color:#6d7280;
margin-top:14px;
}

.tile{
aspect-ratio:1;
border-radius:20px;
cursor:pointer;
}

.lightbox{
position:fixed;
inset:0;
display:none;
z-index:999;
}

.lightbox.show{
display:block;
}

.lightbox-color{
position:absolute;
inset:0;
}

.close-btn{
position:absolute;
top:32px;
right:32px;
width:36px;
height:36px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.22);
color:white;
font-size:22px;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
cursor:pointer;
}

.controls{
position:absolute;
top:32px;
right:84px;
display:flex;
gap:8px;
}

.btn{
width:36px;
height:36px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.22);
color:white;
font-size:16px;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
cursor:pointer;
}

.swipe{
position:absolute;
bottom:18px;
left:50%;
transform:translateX(-50%);
color:white;
letter-spacing:.15em;
font-size:12px;
}

@media (max-width:640px){
.logo{max-width:180px;}
.grid{gap:12px;}
.tile{border-radius:18px;}

.close-btn{
top:28px;
right:28px;
}

.controls{
top:28px;
right:76px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img class="logo" src="logo.png" alt="Shades of Hue logo">
<h1>Bright Winter</h1>
<div>Tap color • Swipe to browse</div>
</div>

<div id="grid" class="grid"></div>

</div>

<div id="lightbox" class="lightbox">
<div id="lightboxColor" class="lightbox-color"></div>

<button id="close" class="close-btn">×</button>

<div class="controls">
<button id="prev" class="btn">←</button>
<button id="next" class="btn">→</button>
</div>

<div class="swipe">SWIPE</div>
</div>

<script>

const groups = [

{
title:"BRIGHT WINTER NEUTRALS",
colors:[
"#FFFFFF",
"#F6F8FB",
"#E7ECF3",
"#D5DBE4",
"#BFC6D1",
"#8E96A3",
"#5F6673",
"#000000"
]
},

{
title:"ICY LIGHTS",
colors:[
"#EAF6FF",
"#EAF0FF",
"#F4ECFF",
"#E8FFF8",
"#FFF0FA",
"#F9FAFF"
]
},

{
title:"COBALT + ELECTRIC BLUES",
colors:[
"#00CFFF",
"#00B8F0",
"#009BFF",
"#1E78F0",
"#245CFF",
"#0038FF"
]
},

{
title:"ROYAL + TRUE BLUES",
colors:[
"#1F4ED8",
"#1B3FB8",
"#1632A8",
"#0E2A92",
"#0A1F7A",
"#0B1B66"
]
},

{
title:"TURQUOISE + AQUAS",
colors:[
"#26E0E6",
"#00D6C8",
"#00C4C4",
"#00B8B8",
"#3DE1D6",
"#1BB7D8"
]
},

{
title:"GREENS",
colors:[
"#3DFF6B",
"#00F090",
"#00E676",
"#00D084",
"#00C97A",
"#00B894"
]
},

{
title:"BRIGHT YELLOWS",
colors:[
"#FFF44F",
"#FFE600",
"#FFD800",
"#FFF200",
"#F7E733",
"#E8DC00"
]
},

{
title:"PINKS + FUCHSIAS",
colors:[
"#FF00A8",
"#FF007A",
"#FF2DB2",
"#FF3DBF",
"#F20E98",
"#E83EB0"
]
},

{
title:"REDS + COOL REDS",
colors:[
"#FF3B30",
"#FF1744",
"#FF0033",
"#E31339",
"#CC0033",
"#B0002A"
]
},

{
title:"PURPLES + VIOLETS",
colors:[
"#A100FF",
"#8F00FF",
"#7A00E6",
"#6A00FF",
"#4B2CFF",
"#5D1A9E"
]
},

{
title:"HIGH CONTRAST DARKS",
colors:[
"#1C2340",
"#20243A",
"#2D344B",
"#2A2A38",
"#3D224A",
"#0F4C81"
]
}

];

const grid=document.getElementById("grid");
const lightbox=document.getElementById("lightbox");
const lightboxColor=document.getElementById("lightboxColor");

let all=[];
let index=0;
let startX=0;

groups.forEach(group=>{

const title=document.createElement("div");
title.className="section-title";
title.textContent=group.title;
grid.appendChild(title);

group.colors.forEach(color=>{

all.push(color);

const tile=document.createElement("div");
tile.className="tile";
tile.style.background=color;

tile.onclick=()=>{
index=all.indexOf(color);
open();
};

grid.appendChild(tile);

});

});

function open(){
lightbox.classList.add("show");
render();
}

function render(){
lightboxColor.style.background=all[index];
}

function next(){
index=(index+1)%all.length;
render();
}

function prev(){
index=(index-1+all.length)%all.length;
render();
}

document.getElementById("close").onclick=()=>lightbox.classList.remove("show");
document.getElementById("next").onclick=next;
document.getElementById("prev").onclick=prev;

lightbox.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

lightbox.addEventListener("touchend",e=>{
let diff=e.changedTouches[0].clientX-startX;
if(Math.abs(diff)<40)return;
diff<0?next():prev();
});

</script>

</body>
</html>
